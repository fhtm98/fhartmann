<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>
<div id="scroll-progress"></div>

<nav id="nav">
  <span class="nav-logo">felix hartmann</span>
  <ul class="nav-links">
    <li><a href="#about" data-section="about">Über mich</a></li>
    <li><a href="#experience" data-section="experience">Erfahrung</a></li>
    <li><a href="#skills" data-section="skills">Skills</a></li>
    <li><a href="#philosophy" data-section="philosophy">Denkweise</a></li>
  </ul>
  <a href="https://www.linkedin.com/in/felix-htm/" target="_blank" rel="noopener" class="nav-cta">LinkedIn</a>
</nav>

{{ content }}

<footer>
  <span class="fc">© 2026 Felix Hartmann</span>
  <span class="fc">Built with Jekyll · Hosted on GitHub Pages</span>
</footer>

<script>
  // ── SCROLL PROGRESS ──────────────────────────────────────────────────────────
  const prog = document.getElementById('scroll-progress');
  const navEl = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    const s = document.documentElement;
    prog.style.transform = `scaleX(${s.scrollTop / (s.scrollHeight - s.clientHeight)})`;
    navEl.classList.toggle('scrolled', window.scrollY > 50);
  }, { passive: true });

  // ── REVEAL + STAGGER ──────────────────────────────────────────────────────────
  const obs = new IntersectionObserver(es => es.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('v'); obs.unobserve(e.target); }
  }), { threshold: 0.08 });
  document.querySelectorAll('.reveal, .stagger').forEach(el => obs.observe(el));

  // ── NAV ACTIVE SECTION ────────────────────────────────────────────────────────
  const navLinks = document.querySelectorAll('.nav-links a[data-section]');
  const secObs = new IntersectionObserver(es => {
    es.forEach(e => {
      if (e.isIntersecting) {
        navLinks.forEach(l => l.classList.toggle('active', l.dataset.section === e.target.id));
      }
    });
  }, { rootMargin: '-40% 0px -55% 0px' });
  document.querySelectorAll('section[id]').forEach(s => secObs.observe(s));

  // ── TIMELINE LINE DRAW ────────────────────────────────────────────────────────
  const tlObs = new IntersectionObserver(es => es.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('in-view'); tlObs.unobserve(e.target); }
  }), { threshold: 0.05 });
  document.querySelectorAll('.timeline').forEach(t => tlObs.observe(t));
</script>
</body>
</html>
